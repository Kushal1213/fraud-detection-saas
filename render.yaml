services:
  # PostgreSQL Database
  - type: pserv
    name: fraud-detection-db
    plan: free
    region: oregon

  # Backend API
  - type: web
    name: fraud-detection-backend
    env: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: fraud-detection-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 8000
      - key: MODEL_PATH
        value: ./artifacts
      - key: MAX_DATASET_SIZE
        value: 100000
      - key: MAX_UPLOAD_SIZE
        value: 10485760
      - key: CORS_ORIGINS
        value: https://fraud-detection-frontend.onrender.com
      - key: REDIS_URL
        value: redis://localhost:6379/0

  # Frontend
  - type: web
    name: fraud-detection-frontend
    env: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://fraud-detection-backend.onrender.com
