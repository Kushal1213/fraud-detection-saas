services:
  - type: web
    name: fraud-detection-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./fraud_detection.db
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 8000
      - key: MODEL_PATH
        value: ./artifacts
      - key: MAX_DATASET_SIZE
        value: 100000
      - key: MAX_UPLOAD_SIZE
        value: 10485760
      - key: CORS_ORIGINS
        value: https://fraud-detection-frontend.onrender.com
      - key: REDIS_URL
        value: redis://localhost:6379/0
